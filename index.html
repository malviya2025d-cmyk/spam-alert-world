<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spam Checker AI</title>

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8334252996051264"
 crossorigin="anonymous"></script>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; background:#0f172a; color:white; margin:0; }
.container { max-width:800px; margin:auto; padding:20px; }
textarea { width:100%; height:120px; padding:10px; }
button { padding:10px 20px; background:red; color:white; border:none; cursor:pointer; }
.card { background:#1e293b; padding:20px; margin-top:20px; border-radius:10px; }
.result { margin-top:15px; }
.bad { color:#ff4d4d; }
.good { color:#4ade80; }
.small { font-size:14px; opacity:0.9; }
</style>
</head>

<body>

<div class="container">

<h1>🌍 Spam Checker AI</h1>

<div class="card">
<h2>Check Message</h2>
<textarea id="msg" placeholder="Paste message here"></textarea>
<br><br>
<button onclick="checkAI()">Check</button>

<div class="result" id="result"></div>
</div>

</div>

<script>

// 🔥 Spam dictionary with weight
const spamDict = {
  "buy": 0.6,
  "now": 0.3,
  "free": 0.7,
  "click": 0.8,
  "here": 0.6,
  "urgent": 0.9,
  "winner": 0.9,
  "win": 0.8,
  "cash": 0.7,
  "prize": 0.9,
  "lottery": 0.95,
  "bitcoin": 0.8,
  "loan": 0.7,
  "limited": 0.6,
  "offer": 0.5
};

// 🔁 Safe words mapping
const safeWords = {
  "buy": "purchase / get",
  "free": "no cost / complimentary",
  "click": "open / tap",
  "here": "this link / this option",
  "urgent": "important",
  "win": "get / receive",
  "prize": "reward",
  "loan": "financial help",
  "offer": "deal / discount"
};

function analyzeSpam(text){
  let words = text.toLowerCase().split(/\s+/);

  let results = [];
  let totalScore = 0;

  words.forEach(w => {
    if(spamDict[w]){
      let score = spamDict[w];
      totalScore += score;

      results.push({
        word: w,
        score: score,
        safe: safeWords[w] || "no suggestion"
      });
    }
  });

  let finalScore = words.length ? (totalScore / words.length) * 100 : 0;

  return {results, finalScore};
}

async function checkAI(){
  let msg = document.getElementById("msg").value;

  document.getElementById("result").innerHTML = "Checking...";

  let analysis = analyzeSpam(msg);

  let spamHTML = "";

  if(analysis.results.length > 0){
    spamHTML += `<h3 class="bad">⚠️ Spam Words Found</h3>`;
    analysis.results.forEach(r => {
      spamHTML += `
        <div>
          <b>${r.word}</b> → Score: ${r.score}  
          <br>
          <span class="small">Safe: ${r.safe}</span>
        </div><br>
      `;
    });
  } else {
    spamHTML += `<h3 class="good">✅ No strong spam detected</h3>`;
  }

  spamHTML += `<hr>
  <h3>📊 Spam Score: ${analysis.finalScore.toFixed(2)}%</h3>`;

  try {
    let res = await fetch("/api/ai", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({prompt: msg})
    });

    let data = await res.json();

    let aiReply = data.reply 
      ? `<h3>🤖 AI Analysis</h3><p>${data.reply}</p>`
      : `<p>⚠️ No AI response</p>`;

    document.getElementById("result").innerHTML = spamHTML + aiReply;

  } catch (err){
    document.getElementById("result").innerHTML = spamHTML + "<p>❌ Server error</p>";
  }
}

</script>

</body>
</html>
