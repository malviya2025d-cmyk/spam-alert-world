<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spam Checker AI</title>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8334252996051264"
     crossorigin="anonymous"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Check spam messages, scam calls, phishing SMS online free">

<style>
body { font-family: Arial; background:#0f172a; color:white; margin:0; }
.container { max-width:800px; margin:auto; padding:20px; }
textarea { width:100%; height:120px; padding:10px; }
button { padding:10px 20px; background:red; color:white; border:none; cursor:pointer; }
.result { margin-top:15px; font-weight:bold; }
.card { background:#1e293b; padding:20px; margin-top:20px; border-radius:10px; }
</style>
</head>

<body>

<div class="container">

<h1>🌍 Spam Checker AI</h1>

<div class="card">
<h2>Check Message</h2>
<textarea id="msg" placeholder="Paste message here"></textarea>
<br><br>
<button onclick="checkAI()">Check</button>
<div class="result" id="result"></div>
</div>

</div>

<script>
async function checkAI(){
  let msg = document.getElementById("msg").value;

  document.getElementById("result").innerText = "Checking...";

  try {
    let res = await fetch("/api/ai", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({prompt: msg})
    });

    let data = await res.json();

    if(data.reply){
      document.getElementById("result").innerText = data.reply;
    } else {
      document.getElementById("result").innerText = "⚠️ No response from AI";
    }

  } catch (err){
    document.getElementById("result").innerText = "❌ Server error";
  }
}
</script>

</body>
</html>
